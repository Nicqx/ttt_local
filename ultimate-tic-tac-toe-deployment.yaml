apiVersion: apps/v1
kind: Deployment
metadata:
  name: ultimate-tic-tac-toe
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ultimate-tic-tac-toe
  template:
    metadata:
      labels:
        app: ultimate-tic-tac-toe
    spec:
      containers:
      - name: ultimate-tic-tac-toe
        image: ultimate-tic-tac-toe:1.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8090
        env:
        - name: PORT
          value: "8090"
        - name: BASE_PATH
          value: "/tic-tac-toe"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: REDIS_KEY_PREFIX
          value: "ttt:session"
        - name: SESSION_TTL_SECONDS
          value: "3600"
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 96Mi
          limits:
            cpu: 250m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ultimate-tic-tac-toe-service
spec:
  type: ClusterIP
  selector:
    app: ultimate-tic-tac-toe
  ports:
  - name: http
    protocol: TCP
    port: 8090
    targetPort: http
